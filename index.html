<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>AIVO</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="img/icon-192.png">

    <!-- Framework7 v8 (LOCAL, plus de blocage Edge) -->
    <link rel="stylesheet" href="lib/framework7/framework7-bundle.min.css">

    <!-- CSS perso -->
    <link rel="stylesheet" href="css/app.css">
</head>

<body>
    <div id="app">

        <!-- PANEL GAUCHE -->
        <div class="panel panel-left panel-cover">
            <div class="view">
                <div class="page">
                    <div class="page-content">

                        <div class="block-title">Connecté en tant que :</div>
                        <div class="block">
                            <p id="panel-username">user</p>
                            <a href="/change-password/" class="button button-outline">Changer le mot de passe</a>
                        </div>

                        <div class="list">
                            <ul>
                                <li><a href="/home-user/" class="item-link panel-close">Accueil</a></li>
                                <li><a href="/documents/" class="item-link panel-close">Documents</a></li>
                                <li><a href="/messages/" class="item-link panel-close">Messages</a></li>
                                <li><a href="#" id="panel-logout" class="item-link panel-close">Déconnexion</a></li>
                            </ul>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- VUE PRINCIPALE (Framework7 charge ici les pages via routes.js) -->
        <div class="view view-main"></div>

    </div>

    <!-- Framework7 JS (LOCAL) -->
    <script src="lib/framework7/framework7-bundle.min.js"></script>

    <!-- JS de ton app -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
