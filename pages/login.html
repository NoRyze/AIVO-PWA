<div class="page" data-name="login">

    <div class="navbar">
        <div class="navbar-inner">
            <div class="title">Connexion</div>
        </div>
    </div>

    <div class="page-content login-screen-content">
        <div class="block">
            <div class="list no-hairlines-md">
                <ul>
                    <li class="item-content item-input">
                        <div class="item-inner">
                            <div class="item-title item-label">Nom d'utilisateur</div>
                            <div class="item-input-wrap">
                                <input type="text" id="login-username" placeholder="admin ou user">
                            </div>
                        </div>
                    </li>

                    <li class="item-content item-input">
                        <div class="item-inner">
                            <div class="item-title item-label">Mot de passe</div>
                            <div class="item-input-wrap">
                                <input type="password" id="login-password" placeholder="******">
                            </div>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="block">
                <a id="login-button" class="button button-fill button-large color-blue">Se connecter</a>
            </div>
        </div>
    </div>

</div>
